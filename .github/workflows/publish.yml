name: publish

# Publish the Python package to PyPI and the Rust crate to crates.io via OIDC Trusted
# Publishing — no long-lived API tokens stored as repo secrets. Each registry mints a
# short-lived token for this specific workflow run.
#
# ONE-TIME SETUP (per registry, in your own account — required before the first run):
#   PyPI:      https://pypi.org/manage/account/publishing/  → add a "pending publisher":
#                owner=cbeech  repo=pertype  workflow=publish.yml  environment=pypi
#   crates.io: https://crates.io/  → crate (or pending) settings → Trusted Publishing →
#                add GitHub  owner=cbeech  repo=pertype  workflow=publish.yml
#
# Trigger: when a GitHub Release is published, or manually via the Actions tab.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  pypi:
    name: PyPI (Trusted Publishing)
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # mint the OIDC token PyPI exchanges for a publish token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  crates:
    name: crates.io (Trusted Publishing)
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # mint the OIDC token crates.io exchanges for a publish token
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Exchange OIDC for a short-lived crates.io token
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish to crates.io
        run: cargo publish --manifest-path rust/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
